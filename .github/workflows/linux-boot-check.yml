name: Linux Boot Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  os-tools-matrix:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OS tool smoke
        run: python scripts/aios-allinone.py os

      - name: Upload OS tool artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: os-tool-artifacts-${{ matrix.os }}
          path: |
            build/tool-smoke/summary.json
            build/tool-smoke/static-chaos-score.json
            build/tool-smoke/memory_journal.jsonl
            build/tool-smoke/adapter_candidates.jsonl
          if-no-files-found: warn

  build-and-boot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            gcc \
            binutils \
            qemu-system-x86 \
            grub-pc-bin \
            xorriso \
            mtools

      - name: Run all-in-one kernel + OS smoke
        run: python scripts/aios-allinone.py all --strict

      - name: Upload boot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-boot-artifacts
          path: |
            build/aios-kernel.bin
            build/aios-kernel.iso
            build/serial_output.log
            build/tool-smoke/summary.json
            build/tool-smoke/static-chaos-score.json
            build/tool-smoke/memory_journal.jsonl
            build/tool-smoke/adapter_candidates.jsonl
          if-no-files-found: warn
