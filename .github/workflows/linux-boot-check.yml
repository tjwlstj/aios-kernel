name: Linux Boot Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-boot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm \
            gcc \
            binutils \
            qemu-system-x86 \
            grub-pc-bin \
            xorriso \
            mtools

      - name: Build kernel
        run: make all

      - name: Build ISO
        run: make iso

      - name: Run QEMU smoke test
        run: make test

      - name: Upload boot artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: linux-boot-artifacts
          path: |
            build/aios-kernel.bin
            build/aios-kernel.iso
            build/serial_output.log
          if-no-files-found: warn
